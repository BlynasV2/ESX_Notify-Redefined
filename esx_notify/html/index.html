<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <title>BlynelisV2 - Notify</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            overflow: hidden; 
            background: transparent; 
        }

        #notifications {
            position: fixed;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 99999;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .notify {
            display: flex;
            align-items: center;
            background: rgba(15, 15, 25, 0.97);
            color: #e0f0ff;
            padding: 14px 18px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            min-width: 360px;
            max-width: 460px;
            font-size: 15.5px;
            line-height: 1.4;
            animation: notifyIn 0.45s ease forwards;
            pointer-events: auto;
            user-select: none;
        }

        .preview-notify {
            cursor: move !important;
            box-shadow: 0 10px 35px rgba(76, 201, 240, 0.85);
            border: 2px dashed #4cc9f0;
        }

        .icon-container {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 16px;
            flex-shrink: 0;
            font-size: 22px;
        }

        .content { flex: 1; }

        .title {
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 3px;
        }

        .message { font-weight: 500; }

        #settings-panel {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 10, 20, 0.98);
            color: #e0f0ff;
            padding: 35px 45px;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(76, 201, 240, 0.5);
            z-index: 100000;
            width: 520px;
            text-align: center;
            display: none;
            border: 1px solid #4cc9f0;
        }

        @keyframes notifyIn { from { transform: translateX(-120px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes notifyOut { to { transform: translateX(-50px); opacity: 0; } }
    </style>
</head>
<body>

    <div id="notifications"></div>

    <div id="settings-panel">
        <h2 id="settings-title">🔔 Notify Nustatymai</h2>
        <p id="settings-desc">Tempk žemiau esantį pranešimą į norimą vietą</p>

        <label style="font-size:17px; margin:25px 0; display:flex; align-items:center; justify-content:center; gap:10px; cursor:pointer;">
            <input type="checkbox" id="sound-checkbox"> 
            <span id="sound-label">Įjungti garsą</span>
        </label>

        <div style="margin-top: 30px;">
            <button id="save-btn" style="background:#00d4ff; color:#111; padding:14px 32px; border:none; border-radius:8px; font-weight:600; margin:0 8px;">Išsaugoti</button>
            <button id="cancel-btn" style="background:transparent; color:#e0f0ff; border:2px solid #666; padding:14px 32px; border-radius:8px; font-weight:600;">Atšaukti</button>
        </div>
    </div>

    <script>
        const container = document.getElementById('notifications')
        const settingsPanel = document.getElementById('settings-panel')
        let previewNotify = null
        let isDragging = false
        let startX, startY, startLeft, startTop

        window.addEventListener('message', function(e) {
            const d = e.data

            if (d.action === "showNotification") {
                createNotification(d.message, d.type)
            }
            if (d.action === "showPreviewNotification") {
                createPreview(d.message)
            }
            if (d.action === "setInitialPosition") {
                container.style.left = (d.position.x || 2) + '%'
                container.style.top  = (d.position.y || 45) + '%'
            }
            if (d.action === "openSettings") {
                settingsPanel.style.display = 'block'
                document.getElementById('sound-checkbox').checked = d.soundOn !== false
                
                if (d.locale) {
                    document.getElementById('settings-title').innerHTML = d.locale.settings_title
                    document.getElementById('settings-desc').textContent = d.locale.settings_desc
                    document.getElementById('sound-label').textContent = d.locale.sound_label
                    document.getElementById('save-btn').textContent = d.locale.btn_save
                    document.getElementById('cancel-btn').textContent = d.locale.btn_cancel
                }
            }
        })

        function createNotification(msg, type = "info") {
            const safeType = (typeof type === "string") ? type.toLowerCase() : "info"
            const n = document.createElement('div')
            n.className = 'notify'

            let icon = 'ℹ️', color = '#3b82f6', title = 'INFORMATION'

            switch(safeType) {
                case 'success':  icon = '✅'; color = '#22c55e'; title = 'SUCCESS'; break;
                case 'error':    icon = '❌'; color = '#ef4444'; title = 'ERROR'; break;
                case 'warning':  icon = '⚠️'; color = '#eab308'; title = 'WARNING'; break;
                case 'neutral':
                case 'notification': icon = '🛎️'; color = '#888888'; title = 'NOTIFICATION'; break;
            }

            n.innerHTML = `
                <div class="icon-container" style="background-color: ${color}30; color: ${color};">
                    ${icon}
                </div>
                <div class="content">
                    <div class="title" style="color: ${color};">${title}</div>
                    <div class="message">${msg || "Pranešimas"}</div>
                </div>
            `
            container.appendChild(n)

            setTimeout(() => {
                n.style.animation = 'notifyOut 0.4s forwards'
                setTimeout(() => n.remove(), 450)
            }, 6500)
        }

        function createPreview(msg) {
            if (previewNotify) previewNotify.remove()

            previewNotify = document.createElement('div')
            previewNotify.className = 'notify preview-notify'
            
            previewNotify.innerHTML = `
                <div class="icon-container" style="background-color: #4cc9f030; color: #4cc9f0;">
                    👈
                </div>
                <div class="content">
                    <div class="title" style="color: #4cc9f0;">INFORMATION</div>
                    <div class="message">${msg}</div>
                </div>
            `
            container.appendChild(previewNotify)
            previewNotify.addEventListener('mousedown', startDrag)
        }

        function startDrag(e) {
            isDragging = true
            startX = e.clientX
            startY = e.clientY
            startLeft = parseFloat(container.style.left) || 2
            startTop  = parseFloat(container.style.top)  || 45
            container.style.transition = 'none'

            document.addEventListener('mousemove', onDrag)
            document.addEventListener('mouseup', stopDrag)
        }

        function onDrag(e) {
            if (!isDragging) return
            const dx = (e.clientX - startX) / window.innerWidth * 100
            const dy = (e.clientY - startY) / window.innerHeight * 100
            let x = Math.max(0.5, Math.min(95, startLeft + dx))
            let y = Math.max(0.5, Math.min(95, startTop + dy))
            container.style.left = x + '%'
            container.style.top  = y + '%'
        }

        function stopDrag() {
            isDragging = false
            container.style.transition = 'all 0.3s ease'
            document.removeEventListener('mousemove', onDrag)
            document.removeEventListener('mouseup', stopDrag)
        }

        document.getElementById('save-btn').onclick = () => {
            const pos = { x: parseFloat(container.style.left) || 2, y: parseFloat(container.style.top) || 45 }
            const soundOn = document.getElementById('sound-checkbox').checked

            fetch(`https://${GetParentResourceName()}/saveSettings`, {
                method: 'POST',
                body: JSON.stringify({position: pos, soundOn: soundOn})
            }).then(() => {
                if (previewNotify) previewNotify.remove()
                settingsPanel.style.display = 'none'
            })
        }

        document.getElementById('cancel-btn').onclick = () => {
            if (previewNotify) previewNotify.remove()
            fetch(`https://${GetParentResourceName()}/closeSettings`, {method:'POST', body:'{}'})
            settingsPanel.style.display = 'none'
        }

        document.addEventListener('keydown', e => {
            if (e.key === "Escape" && settingsPanel.style.display === 'block') {
                document.getElementById('cancel-btn').click()
            }
        })

        container.style.left = '2%'
        container.style.top  = '45%'
    </script>
</body>
</html>
